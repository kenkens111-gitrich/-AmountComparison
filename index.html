<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>どれがお得？ 単価比較アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      -webkit-tap-highlight-color: transparent;
    }
    
    @keyframes bounce-short {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15%); }
    }
    .animate-bounce-short {
      animation: bounce-short 1s ease-in-out 3;
    }
    
    @keyframes fade-in-down {
      0% { opacity: 0; transform: translate(-50%, -20px); }
      100% { opacity: 1; transform: translate(-50%, 0); }
    }
    .animate-fade-in-down {
      animation: fade-in-down 0.3s ease-out forwards;
    }

    /* 最安値のハイライト */
    .cheapest-item {
      background-color: #eff6ff !important;
      border-color: #3b82f6 !important;
    }
    
    /* 数値入力のスピンボタンを隠す */
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
  </style>
</head>
<body class="text-gray-800 pb-32">

  <div class="max-w-md mx-auto p-2">
    
    <!-- ヘッダー -->
    <div class="bg-white rounded-xl shadow-sm p-3 mb-2">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <h1 class="text-base font-bold text-blue-600">単価比較スキャン</h1>
          <button id="settingsBtn" class="p-1 rounded-full text-orange-500 bg-orange-100 animate-pulse transition-colors" title="詳細設定">
            <i class="ph ph-gear text-base"></i>
          </button>
        </div>
        <button id="resetBtn" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded transition-colors text-xs font-medium">
          <i class="ph ph-trash"></i> リセット
        </button>
      </div>

      <!-- メインアクションボタン -->
      <button id="openCameraBtn" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-md transition-all font-bold text-sm active:scale-95">
        <i class="ph ph-scan text-xl"></i>
        カメラで値札をまとめ撮り
      </button>
      
      <p class="text-[10px] text-gray-400 mt-2 text-center">
        <i class="ph ph-info"></i> まとめて撮影して一気に解析できます
      </p>
    </div>

    <!-- 比較リスト -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div id="itemsContainer" class="flex flex-col">
        <!-- JavaScriptで動的に生成 -->
      </div>
      <div class="p-2 bg-gray-50 border-t border-gray-100">
        <button id="addRowBtn" class="w-full py-2.5 border-2 border-dashed border-blue-200 text-blue-500 rounded-lg hover:bg-blue-100 font-bold text-sm transition-colors flex items-center justify-center gap-1 active:scale-[0.98]">
          <i class="ph ph-plus-circle text-lg"></i> 行を追加
        </button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[60] flex items-center gap-2 px-5 py-3 rounded-full shadow-2xl text-sm font-bold animate-fade-in-down whitespace-nowrap hidden">
    <i id="toastIcon" class="text-lg"></i>
    <span id="toastText"></span>
  </div>

  <!-- エラー報告用ダイアログ -->
  <div id="alertDialog" class="fixed inset-0 z-[70] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform scale-95 transition-transform duration-200" id="alertDialogContent">
      <div class="p-6 text-center">
        <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="ph-fill ph-warning text-3xl text-yellow-500"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-800 mb-2" id="alertTitle">読み取りエラー</h3>
        <p class="text-sm text-gray-600 mb-6" id="alertMessage">メッセージ</p>
        <button id="closeAlertBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-colors active:scale-95">
          確認
        </button>
      </div>
    </div>
  </div>

  <!-- 詳細設定モーダル -->
  <div id="settingsModal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
      <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-bold text-gray-800 flex items-center gap-2">
          <i class="ph ph-gear text-gray-500"></i> 詳細設定
        </h2>
        <button id="closeSettingsBtn" class="text-gray-400 hover:text-gray-600">
          <i class="ph ph-x text-xl"></i>
        </button>
      </div>
      <div class="p-5">
        <!-- API Key -->
        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Gemini API Key</label>
        <input
          type="text"
          id="apiKeyInput"
          placeholder="AIzaSy..."
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4 font-mono text-sm"
        />

        <!-- Model Name (Full row) -->
        <div class="mb-4">
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase flex justify-between">
            AI Model 
            <a href="https://ai.google.dev/gemini-api/docs/models/gemini" target="_blank" class="text-blue-500 font-normal hover:underline flex items-center gap-0.5">
              モデル一覧 <i class="ph ph-arrow-square-out"></i>
            </a>
          </label>
          <input
            type="text"
            id="modelInput"
            placeholder="gemini-2.5-flash-lite"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 font-mono text-sm"
          />
        </div>

        <!-- Tax Rate (Full row) -->
        <div class="mb-4">
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">消費税率 (%)</label>
          <input
            type="number"
            id="taxRateInput"
            placeholder="10"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 font-bold text-sm"
          />
        </div>

        <div class="flex justify-end gap-2 mt-2">
          <button id="cancelSettingsBtn" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
            キャンセル
          </button>
          <button id="saveSettingsBtn" class="px-6 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">
            設定を保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 撮影用オーバーレイ -->
  <div id="cameraOverlay" class="fixed inset-0 z-50 bg-black flex flex-col hidden">
    <div class="flex justify-between items-center p-4 bg-gradient-to-b from-black/80 to-transparent absolute top-0 left-0 right-0 z-10">
      <div class="text-white">
        <h2 class="font-bold text-base flex items-center gap-2"><i class="ph ph-scan"></i> まとめ撮り</h2>
        <p class="text-[10px] text-gray-300">値札を枠に収めてシャッターを押してください</p>
      </div>
      <button id="closeCameraBtn" class="p-2 bg-white/20 rounded-full text-white hover:bg-white/40 backdrop-blur-sm transition-colors">
        <i class="ph ph-x text-xl"></i>
      </button>
    </div>

    <div class="flex-1 relative overflow-hidden flex items-center justify-center bg-gray-900" id="cameraViewArea">
      <video id="videoElement" autoplay playsinline webkit-playsinline muted class="absolute min-w-full min-h-full object-cover"></video>
      <div class="absolute w-4/5 h-1/3 max-h-64 border-2 border-white/50 rounded-xl shadow-[0_0_0_9999px_rgba(0,0,0,0.5)] flex items-center justify-center pointer-events-none">
        <div class="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-green-400"></div>
        <div class="absolute top-2 right-2 w-4 h-4 border-t-2 border-r-2 border-green-400"></div>
        <div class="absolute bottom-2 left-2 w-4 h-4 border-b-2 border-l-2 border-green-400"></div>
        <div class="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-green-400"></div>
      </div>
      <div id="cameraLoading" class="absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center z-20 hidden">
        <i class="ph ph-spinner-gap text-blue-400 text-5xl animate-spin mb-3"></i>
        <p class="text-white font-bold text-base animate-pulse">まとめて解析中...</p>
      </div>
    </div>

    <div class="p-6 bg-black pb-12 flex items-center justify-between relative z-10">
      <div class="w-1/3 flex justify-start pl-2">
         <div id="imageCountBadge" class="hidden flex-col items-center justify-center text-white">
            <span class="text-2xl font-bold leading-none text-blue-400" id="capturedCount">0</span>
            <span class="text-[10px] text-gray-400 mt-1">枚撮影済</span>
         </div>
      </div>
      <div class="w-1/3 flex justify-center">
        <button id="shutterBtn" class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center transition-transform active:scale-95 relative">
          <div class="w-16 h-16 bg-white rounded-full hover:bg-gray-200"></div>
        </button>
      </div>
      <div class="w-1/3 flex justify-end pr-2">
        <button id="analyzeBtn" class="hidden flex-col items-center justify-center text-blue-400 hover:text-blue-300 transition-colors">
           <i class="ph-fill ph-check-circle text-4xl"></i>
           <span class="text-[10px] font-bold mt-1 text-white">解析する</span>
        </button>
      </div>
      <p id="cameraHelperText" class="absolute bottom-4 text-gray-400 text-[10px] text-center w-full">シャッターを押して複数枚まとめて撮影できます</p>
    </div>
  </div>

  <canvas id="hiddenCanvas" class="hidden"></canvas>

  <script>
    // --- 状態管理 ---
    let items = Array.from({ length: 5 }, (_, i) => ({
      id: Date.now() + i,
      name: '',
      price: '',
      qty1: '',
      qty2: '',
      isTaxExcluded: false,
    }));
    
    let capturedImages = []; 
    let isAnalyzing = false;
    let stream = null;
    let toastTimeout = null;

    const itemsContainer = document.getElementById('itemsContainer');
    const resetBtn = document.getElementById('resetBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const cancelSettingsBtn = document.getElementById('cancelSettingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelInput = document.getElementById('modelInput');
    const taxRateInput = document.getElementById('taxRateInput');
    const openCameraBtn = document.getElementById('openCameraBtn');
    const cameraOverlay = document.getElementById('cameraOverlay');
    const closeCameraBtn = document.getElementById('closeCameraBtn');
    const videoElement = document.getElementById('videoElement');
    const shutterBtn = document.getElementById('shutterBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const cameraLoading = document.getElementById('cameraLoading');
    const cameraViewArea = document.getElementById('cameraViewArea');
    const imageCountBadge = document.getElementById('imageCountBadge');
    const capturedCount = document.getElementById('capturedCount');
    const cameraHelperText = document.getElementById('cameraHelperText');
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');
    const alertDialog = document.getElementById('alertDialog');
    const alertDialogContent = document.getElementById('alertDialogContent');
    const alertTitle = document.getElementById('alertTitle');
    const alertMessage = document.getElementById('alertMessage');
    const closeAlertBtn = document.getElementById('closeAlertBtn');

    // 定数
    const DEFAULT_MODEL = 'gemini-2.5-flash-lite';
    const DEFAULT_TAX_RATE = 10;

    function init() {
      const savedKey = localStorage.getItem('gemini_api_key');
      const savedModel = localStorage.getItem('gemini_model') || DEFAULT_MODEL;
      const savedTaxRate = localStorage.getItem('gemini_tax_rate') || DEFAULT_TAX_RATE;
      
      if (savedKey) {
        apiKeyInput.value = savedKey;
        settingsBtn.classList.remove('text-orange-500', 'bg-orange-100', 'animate-pulse');
        settingsBtn.classList.add('text-gray-400', 'hover:bg-gray-100');
      }
      modelInput.value = savedModel;
      taxRateInput.value = savedTaxRate;
      
      renderItems();
    }

    function getApiKey() { return localStorage.getItem('gemini_api_key'); }
    function getModel() { return localStorage.getItem('gemini_model') || DEFAULT_MODEL; }
    function getTaxRate() { return parseFloat(localStorage.getItem('gemini_tax_rate')) || DEFAULT_TAX_RATE; }

    function showToastMsg(message, type = 'success') {
      clearTimeout(toastTimeout);
      toastText.textContent = message;
      toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 z-[60] flex items-center gap-2 px-5 py-3 rounded-full shadow-lg text-sm font-bold animate-fade-in-down whitespace-nowrap`;
      if (type === 'success') {
        toast.classList.add('bg-green-600', 'text-white');
        toastIcon.className = 'ph-fill ph-check-circle text-lg';
      } else if (type === 'error') {
        toast.classList.add('bg-red-500', 'text-white');
        toastIcon.className = 'ph-fill ph-warning-circle text-lg';
      } else {
        toast.classList.add('bg-blue-600', 'text-white');
        toastIcon.className = 'ph ph-info text-lg';
      }
      toast.classList.remove('hidden');
      toastTimeout = setTimeout(() => { toast.classList.add('hidden'); }, 3000);
    }

    function showAlert(title, message) {
      alertTitle.textContent = title;
      alertMessage.innerHTML = message.replace(/\n/g, '<br>');
      alertDialog.classList.remove('hidden');
      setTimeout(() => {
        alertDialogContent.classList.remove('scale-95');
        alertDialogContent.classList.add('scale-100');
      }, 10);
    }

    closeAlertBtn.addEventListener('click', () => {
      alertDialogContent.classList.remove('scale-100');
      alertDialogContent.classList.add('scale-95');
      setTimeout(() => { alertDialog.classList.add('hidden'); }, 200);
    });

    function updateCameraUI() {
      if (capturedImages.length > 0) {
        imageCountBadge.classList.remove('hidden');
        imageCountBadge.classList.add('flex');
        capturedCount.textContent = capturedImages.length;
        analyzeBtn.classList.remove('hidden');
        analyzeBtn.classList.add('flex');
        cameraHelperText.textContent = "解析するボタンを押すとリストに追加されます";
      } else {
        imageCountBadge.classList.add('hidden');
        imageCountBadge.classList.remove('flex');
        analyzeBtn.classList.add('hidden');
        analyzeBtn.classList.remove('flex');
        cameraHelperText.textContent = "シャッターを押して複数枚まとめて撮影できます";
      }
    }

    function renderItems() {
      const currentTaxRate = getTaxRate();
      const taxMultiplier = 1 + (currentTaxRate / 100);
      let minUnitPrice = Infinity;

      const processedItems = items.map(item => {
        const price = parseFloat(item.price);
        const q1 = parseFloat(item.qty1);
        let q2 = parseFloat(item.qty2);
        if (isNaN(q2)) q2 = 1;
        
        let displayUnitPrice = null; 
        let comparableUnitPrice = null; 
        let unitPriceDisplayHtml = '<span class="text-gray-300">-</span>';

        if (!isNaN(price) && !isNaN(q1) && q1 > 0) {
          const totalQty = q1 * q2;
          const rawUnitPrice = price / totalQty; 
          
          displayUnitPrice = item.isTaxExcluded ? rawUnitPrice * taxMultiplier : rawUnitPrice;
          comparableUnitPrice = displayUnitPrice;
          
          let formattedValue = parseFloat(displayUnitPrice.toFixed(4)).toString();
          let parts = formattedValue.split('.');
          let integerPart = parts[0];
          let decimalPart = parts[1] ? `.${parts[1]}` : '';
          unitPriceDisplayHtml = `<span class="text-2xl">${integerPart}</span><span class="text-sm">${decimalPart}</span><span class="text-[10px] ml-0.5">円</span>`;
          
          if (comparableUnitPrice < minUnitPrice) minUnitPrice = comparableUnitPrice;
        }
        return { ...item, displayUnitPrice, comparableUnitPrice, unitPriceDisplayHtml };
      });

      const validItemCount = processedItems.filter(item => item.displayUnitPrice !== null).length;
      itemsContainer.innerHTML = processedItems.map((item, index) => {
        const isCheapest = item.comparableUnitPrice !== null && item.comparableUnitPrice === minUnitPrice;
        const highlightClass = isCheapest && validItemCount > 1 ? 'cheapest-item border-l-4 border-l-blue-500' : 'bg-white border-b border-gray-100';
        const nameTextClass = isCheapest && validItemCount > 1 ? 'text-blue-600' : 'text-gray-800';
        return `
          <div class="flex flex-col px-3 py-2 transition-colors ${highlightClass}">
            <div class="flex items-center justify-between mb-0.5">
              <div class="flex items-center gap-1 w-full mr-2">
                ${isCheapest && validItemCount > 1 ? '<i class="ph-fill ph-medal text-blue-500 text-sm"></i>' : ''}
                <input type="text" value="${item.name}" onchange="updateItem(${index}, 'name', this.value)" class="w-full bg-transparent border-none outline-none text-[10px] text-gray-400 focus:text-gray-700 p-0 m-0" placeholder="商品名 ${index + 1}" ${isAnalyzing ? 'disabled' : ''}>
              </div>
              
              <label class="flex items-center gap-0.5 text-[9px] text-gray-400 mr-2 whitespace-nowrap cursor-pointer select-none">
                <input type="checkbox" onchange="updateItem(${index}, 'isTaxExcluded', this.checked)" ${item.isTaxExcluded ? 'checked' : ''} ${isAnalyzing ? 'disabled' : ''} class="w-3 h-3 accent-red-500">
                <span class="${item.isTaxExcluded ? 'text-red-500 font-bold' : ''}">税抜→税込</span>
              </label>

              <button onclick="clearRow(${index})" class="text-gray-300 hover:text-red-500 p-1 transition-colors" ${isAnalyzing ? 'disabled' : ''}>
                <i class="ph ph-x text-sm"></i>
              </button>
            </div>
            <div class="flex items-center gap-1 mt-1">
              <div class="w-[4.5rem]">
                <input type="number" step="any" value="${item.price}" onchange="updateItem(${index}, 'price', this.value)" class="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-sm font-medium focus:outline-blue-400 text-center placeholder-gray-400" placeholder="価格" ${isAnalyzing ? 'disabled' : ''}>
              </div>
              <div class="text-gray-300 text-xs font-bold">/</div>
              <div class="flex items-center gap-1">
                <div class="w-[4.2rem]">
                  <input type="number" step="any" value="${item.qty1}" onchange="updateItem(${index}, 'qty1', this.value)" class="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-sm font-medium focus:outline-blue-400 text-center placeholder-gray-400" placeholder="容量" ${isAnalyzing ? 'disabled' : ''}>
                </div>
                <div class="text-gray-400 text-[10px]">×</div>
                <div class="w-[3.2rem]">
                  <input type="number" step="any" value="${item.qty2}" onchange="updateItem(${index}, 'qty2', this.value)" class="w-full bg-gray-50 border border-gray-200 rounded p-1.5 text-sm font-medium focus:outline-blue-400 text-center placeholder-gray-300" placeholder="1" ${isAnalyzing ? 'disabled' : ''}>
                </div>
              </div>
              <div class="flex-1 text-right flex flex-col justify-center">
                <div class="flex items-center justify-end gap-1 mb-0.5">
                   ${item.isTaxExcluded && item.displayUnitPrice !== null ? `<span class="bg-red-100 text-red-600 text-[8px] px-1 py-0.5 rounded font-bold leading-none">税込(${currentTaxRate}%)換算</span>` : ''}
                   <span class="text-[9px] text-gray-400 leading-none">1あたり</span>
                </div>
                <div class="font-bold leading-none ${nameTextClass}">
                  ${item.unitPriceDisplayHtml}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.updateItem = (index, field, value) => {
      items[index][field] = value;
      renderItems();
    };

    window.clearRow = (index) => {
      items.splice(index, 1);
      renderItems();
    };

    document.getElementById('addRowBtn').addEventListener('click', () => {
      items.push({ id: Date.now(), name: '', price: '', qty1: '', qty2: '', isTaxExcluded: false });
      renderItems();
    });

    resetBtn.addEventListener('click', () => {
      items = Array.from({ length: 5 }, (_, i) => ({
        id: Date.now() + i, name: '', price: '', qty1: '', qty2: '', isTaxExcluded: false
      }));
      renderItems();
      showToastMsg("リセットしました", "success");
    });

    settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
    closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
    cancelSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
    
    saveSettingsBtn.addEventListener('click', () => {
      const apiKeyVal = apiKeyInput.value.trim();
      const modelVal = modelInput.value.trim() || DEFAULT_MODEL;
      const taxRateVal = taxRateInput.value.trim() || DEFAULT_TAX_RATE;
      
      localStorage.setItem('gemini_api_key', apiKeyVal);
      localStorage.setItem('gemini_model', modelVal);
      localStorage.setItem('gemini_tax_rate', taxRateVal);
      
      settingsModal.classList.add('hidden');
      renderItems(); 
      
      if(apiKeyVal) {
        settingsBtn.classList.remove('text-orange-500', 'bg-orange-100', 'animate-pulse');
        settingsBtn.classList.add('text-gray-400', 'hover:bg-gray-100');
        showToastMsg("設定を保存しました", "success");
      }
    });

    openCameraBtn.addEventListener('click', async () => {
      if (!getApiKey()) {
        settingsModal.classList.remove('hidden');
        showToastMsg("先にAPIキーを設定してください", "error");
        return;
      }
      cameraOverlay.classList.remove('hidden');
      capturedImages = []; 
      updateCameraUI();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        videoElement.srcObject = stream;
        videoElement.onloadedmetadata = () => { videoElement.play(); };
      } catch (err) {
        console.error(err);
        showToastMsg("カメラの起動に失敗しました。", "error");
        closeCamera();
      }
    });

    function closeCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      videoElement.srcObject = null;
      cameraOverlay.classList.add('hidden');
      capturedImages = [];
      updateCameraUI();
    }

    closeCameraBtn.addEventListener('click', closeCamera);

    shutterBtn.addEventListener('click', () => {
      if (isAnalyzing) return;
      hiddenCanvas.width = videoElement.videoWidth || 640;
      hiddenCanvas.height = videoElement.videoHeight || 480;
      const ctx = hiddenCanvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
      const base64DataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.8);
      const base64Image = base64DataUrl.split(',')[1];
      if (base64Image.length < 1000) return;
      
      capturedImages.push(base64Image);
      updateCameraUI();
      
      const flash = document.createElement('div');
      flash.className = 'absolute inset-0 bg-white opacity-0 transition-opacity duration-100 z-30 pointer-events-none';
      cameraViewArea.appendChild(flash);
      requestAnimationFrame(() => {
         flash.classList.remove('opacity-0');
         flash.classList.add('opacity-80');
         setTimeout(() => {
             flash.classList.remove('opacity-80');
             flash.classList.add('opacity-0');
             setTimeout(() => flash.remove(), 100);
         }, 50);
      });
    });

    analyzeBtn.addEventListener('click', () => {
      if (capturedImages.length === 0 || isAnalyzing) return;
      executeAIAnalysis();
    });

    async function executeAIAnalysis() {
      isAnalyzing = true;
      cameraLoading.classList.remove('hidden');
      shutterBtn.classList.add('opacity-30');
      analyzeBtn.classList.add('opacity-30');
      const apiKey = getApiKey();
      const modelName = getModel();
      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
        const prompt = `あなたは価格・内容量読み取りAIです。提供された${capturedImages.length}枚の画像それぞれから情報を抽出してください。
        重要ルール:
        1. 価格: 税込価格を最優先。数字のみ。
        2. 内容量: 「60m × 18ロール」なら qty1: 60, qty2: 18。
        3. 税抜判定: 「+税」「本体価格」「税別」等があり、税込価格がない場合のみ isTaxExcluded を true に。
        4. エラー判定: 全く読み取れない場合のみ error を true に。
        結果は画像の順番通りのJSON配列で出力。`;

        const parts = [{ text: prompt }];
        capturedImages.forEach(img => {
            parts.push({ inlineData: { mimeType: 'image/jpeg', data: img } });
        });
        const payload = {
          contents: [{ role: "user", parts: parts }],
          generationConfig: { 
              responseMimeType: "application/json",
              responseSchema: {
                  type: "ARRAY",
                  items: {
                      type: "OBJECT",
                      properties: {
                          "index": { type: "INTEGER" },
                          "name": { type: "STRING" },
                          "price": { type: "NUMBER" },
                          "qty1": { type: "NUMBER" },
                          "qty2": { type: "NUMBER" },
                          "isTaxExcluded": { type: "BOOLEAN" },
                          "error": { type: "BOOLEAN" }
                      },
                      required: ["error"]
                  }
              }
          }
        };
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.error) throw new Error(result.error.message);
        const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!responseText) throw new Error("解析結果が空でした");
        let parsedData = JSON.parse(responseText);
        if (!Array.isArray(parsedData)) parsedData = [parsedData];

        parsedData.forEach((data, idx) => {
            const imgIndex = data.index || (idx + 1);
            if (data.error || !data.price || !data.qty1) return; 
            const emptyIndex = items.findIndex(item => item.price === '' && item.qty1 === '');
            if (emptyIndex !== -1) {
              if (data.name) items[emptyIndex].name = data.name;
              items[emptyIndex].price = String(data.price);
              items[emptyIndex].qty1 = String(data.qty1);
              if (data.qty2 && data.qty2 != 1) items[emptyIndex].qty2 = String(data.qty2);
              items[emptyIndex].isTaxExcluded = data.isTaxExcluded || false;
            } else {
              items.push({
                id: Date.now() + Math.random(),
                name: data.name || '',
                price: String(data.price),
                qty1: String(data.qty1),
                qty2: (data.qty2 && data.qty2 != 1) ? String(data.qty2) : '',
                isTaxExcluded: data.isTaxExcluded || false
              });
            }
        });
        showToastMsg("解析が完了しました", 'success');
        closeCamera();
      } catch (error) {
        console.error(error);
        showToastMsg(`エラー: ${error.message.substring(0, 20)}`, "error");
      } finally {
        isAnalyzing = false;
        cameraLoading.classList.add('hidden');
        shutterBtn.classList.remove('opacity-30');
        analyzeBtn.classList.remove('opacity-30');
        renderItems();
      }
    }
    init();
  </script>
</body>
</html>
